        const AI_AVATAR = "https://spicy-harlequin-pqaujlkovi.edgeone.app/pngtree-beautiful-ai-generated-girl-so-much-attractive-png-image_12342109.png";

        // 🧠 MOTOR CORE
        const Core = {
            h: [], typing: false,
            init() {
                this.h = Storage.get('l_chat') || [];
                UI.update(); this.h.forEach(m => UI.draw(m.r, m.t));
                UI.setSkin(Storage.get('l_skin') || 'gold');
                this.checkUpdates();
                Visual.init();
                prepararMotorPiP();
                UI.setupSwipeMenu();
            },
            
            // ⚡ MOTOR DE ATUALIZAÇÃO CORRIGIDO: Agora avisa no menu em vez de forçar a tela
            checkUpdates() {
                if (Storage.get('l_version') !== VERSION) {
                    UI.showUpdateAlert(); // Dispara o alerta no menu
                    return; 
                }

                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('sw.js?v=' + VERSION).then(reg => {
                        reg.onupdatefound = () => {
                            const newWorker = reg.installing;
                            newWorker.onstatechange = () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    UI.showUpdateAlert(); // Dispara o alerta no menu
                                }
                            };
                        };
                    });
                }
            },
            
            triggerSplashUpdate() {
                UI.menu(false); 
                document.getElementById('update-splash').style.display = 'flex';
                let p = 0; const bar = document.getElementById('u-progress');
                
                const interval = setInterval(() => {
                    p += 2; bar.style.width = p + '%';
                    if (p >= 100) {
                        clearInterval(interval); 
                        Storage.set('l_version', VERSION);
                        
                        if ('serviceWorker' in navigator) {
                            navigator.serviceWorker.getRegistrations().then(regs => {
                                for (let reg of regs) { reg.unregister(); }
                            }).then(() => {
                                if(window.caches) {
                                    caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => {
                                        window.location.href = location.origin + location.pathname + '?v=' + new Date().getTime();
                                    });
                                } else { window.location.href = location.origin + location.pathname + '?v=' + new Date().getTime(); }
                            });
                        } else { window.location.href = location.origin + location.pathname + '?v=' + new Date().getTime(); }
                    }
                }, 40); 
            },

            async ativarNotificacoes() {
                const p = await Notification.requestPermission();
                if (p === 'granted') {
                    const reg = await navigator.serviceWorker.ready;
                    reg.showNotification("LARA OMEGA", {
                        body: "⚡ Alertas do Sistema Ativados!",
                        icon: AI_AVATAR,
                        vibrate: [200, 100, 200]
                    });
                    alert("Notificações no menu do Android liberadas!");
                }
            },
            clearChat() {
                if (confirm("Irmão, deseja apagar todo o histórico de conversas?")) {
                    this.h = [];
                    Storage.set('l_chat', []);
                    document.getElementById('chat-box').innerHTML = '';
                    UI.menu(false);
                }
            },
            async send() {
                if (this.typing) return;
                const i = document.getElementById('u-in'); let t = i.value.trim(); if (!t) return;
                this.typing = true; i.value = ""; UI.draw('user', t); this.h.push({t, r:'user'});
                UI.dots(true);
                try {
                    const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(t)}?private=true&model=openai`);
                    const txt = await res.text(); UI.dots(false);
                    const clean = txt.replace(/Ad 🌸|Support/gi, '').trim();
                    UI.draw('ai', clean); this.h.push({t: clean, r:'ai'});
                    Storage.set('l_chat', this.h.slice(-20));
                } catch (e) { UI.dots(false); }
                this.typing = false;
            }
        };

        // 🎨 MOTOR UI
        const UI = {
            box: document.getElementById('chat-box'), main: document.getElementById('chat-main'),
            
            // ⚡ FUNÇÃO DE ALERTA NO MENU
            showUpdateAlert() {
                document.getElementById('menu-alert-dot').style.display = 'block'; // Acende a bolinha vermelha no topo
                document.getElementById('btn-update-available').style.display = 'block'; // Mostra o botão verde no menu
            },

            setSkin(s) { document.body.className = s === 'gold' ? '' : `theme-${s}`; Storage.set('l_skin', s); },
            toggleNexus(s) { document.getElementById('donate-modal').style.display = s ? 'flex' : 'none'; this.menu(false); },
            copyPix() { navigator.clipboard.writeText("61318165300"); alert("PIX Copiado!"); },
            draw(r, t) {
                const w = document.createElement('div'); w.className = `msg ${r}`;
                const av = r === 'user' ? '👤' : `<img src="${AI_AVATAR}" style="width:100%;">`;
                w.innerHTML = `${r==='ai' ? `<div class="avatar">${av}</div>` : ''}<div class="bubble">${marked.parse(t)}</div>${r==='user' ? `<div class="avatar">${av}</div>` : ''}`;
                this.box.appendChild(w); this.main.scrollTop = this.main.scrollHeight;
            },
            dots(s) { if(s){ const d=document.createElement('div'); d.id='dots'; d.className='msg ai'; d.innerHTML=`<div class="avatar"><img src="${AI_AVATAR}" style="width:100%;"></div><div class="bubble">...</div>`; this.box.appendChild(d); } else { const d=document.getElementById('dots'); if(d) d.remove(); } this.main.scrollTop = this.main.scrollHeight; },
            size(t) { t.style.height='auto'; t.style.height=t.scrollHeight+'px'; },
            
            menu(s) { 
                const m = document.getElementById('menu');
                const o = document.getElementById('overlay');
                m.classList.toggle('open', s); 
                s ? o.classList.add('active') : o.classList.remove('active');
                document.body.style.overflow = s ? 'hidden' : ''; 
            },
            
            setupSwipeMenu() {
                let startX = 0;
                const menuEl = document.getElementById('menu');
                document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
                document.addEventListener('touchend', e => {
                    let endX = e.changedTouches[0].clientX;
                    if (menuEl.classList.contains('open') && startX - endX > 50) {
                        this.menu(false);
                    }
                });
            },

            update() { 
                const photo = Storage.get('l_photo');
                if(photo) { document.getElementById('p-btn-top').innerHTML = `<img src="${photo}" style="width:100%;height:100%;object-fit:cover;">`; document.getElementById('menu-photo').innerHTML = `<img src="${photo}" style="width:100%;height:100%;object-fit:cover;">`; }
            }
        };

        // 🖼️ MOTOR VISUAL OMEGA v29
        const Visual = {
            slides: document.querySelectorAll('.bg-slide'),
            current: 0,
            prompts: [
                "manga_panel_dark_aesthetic_heavy_crosshatching_nanquim_ink_masterpiece_8k_character_zero_and_lara",
                "3d_render_luxurious_mansion_swimming_pool_night_lighting_rpg_environment_8k_highly_detailed",
                "polaroid_photography_glamorous_portrait_dramatic_flash_lighting_white_curtain_background",
                "cyberpunk_city_neon_rain_professional_photography_unreal_engine_5_ultra_detailed",
                "anime_aesthetic_landscape_night_sky_starry_cinematic_masterpiece_highly_detailed"
            ],

            async update() {
                const theme = this.prompts[Math.floor(Math.random() * this.prompts.length)];
                const seed = Math.floor(Math.random() * 999999);
                const url = `https://image.pollinations.ai/prompt/${theme}?width=1080&height=1920&nologo=true&seed=${seed}`;

                const nextIndex = 1 - this.current;
                const nextSlide = this.slides[nextIndex];
                const activeSlide = this.slides[this.current];

                const img = new Image();
                img.crossOrigin = "anonymous"; 

                img.onload = () => {
                    nextSlide.style.backgroundImage = `url(${url})`;
                    activeSlide.classList.remove('active');
                    nextSlide.classList.add('active');
                    this.current = nextIndex;
                };

                img.onerror = () => {
                    setTimeout(() => this.update(), 10000);
                };

                img.src = url;
            },

            init() {
                this.update();
                setInterval(() => this.update(), 60000);
            }
        };

        // 🎞️ MOTOR PiP (MODO PROJEÇÃO)
        let videoPiP = null;
        function prepararMotorPiP() {
            const canvas = document.createElement('canvas'); canvas.width = 400; canvas.height = 400;
            const ctx = canvas.getContext('2d');
            function loop() {
                ctx.fillStyle = '#050811'; ctx.fillRect(0,0,400,400);
                ctx.fillStyle = '#00f2ff'; ctx.font = 'bold 20px Inter'; ctx.fillText('⚡ LARA v29 OMEGA', 50, 200);
                requestAnimationFrame(loop);
            }
            loop();
            videoPiP = document.createElement('video');
            videoPiP.srcObject = canvas.captureStream();
            videoPiP.muted = true; videoPiP.play();
        }
        async function ativarProjeçãoLara() {
            try { 
                if (videoPiP) await videoPiP.requestPictureInPicture(); 
                UI.menu(false);
            } catch(e) { alert("PiP não suportado neste navegador."); }
        }

        window.onload = () => Core.init();
    </script>
</body>
</html>
