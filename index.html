<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#050811">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Lara Elite v21.11</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Fira+Code:wght@400;500&display=swap');
        
        :root { --accent: #2563eb; --gold: #D4AF37; --bg: #050811; --card-bg: rgba(15, 20, 35, 0.85); --neon: #00f2ff; }
        body.theme-cyber { --accent: #c026d3; --gold: #22d3ee; --bg: #020617; --card-bg: rgba(30, 0, 60, 0.7); --neon: #f0abfc; }
        body.theme-stealth { --accent: #334155; --gold: #94a3b8; --bg: #0f172a; --card-bg: rgba(15, 23, 42, 0.95); --neon: #cbd5e1; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        html, body { background: #050811; color: #fff; height: 100dvh; width: 100vw; overflow: hidden; transition: background 0.5s ease; overscroll-behavior-y: none; }
        
        #bg-container { position: fixed; inset: 0; z-index: -2; background: #050811; }
        @keyframes bgPan { 0% { transform: scale(1); } 100% { transform: scale(1.08); } }
        .bg-slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 2s ease-in-out; animation: bgPan 30s infinite alternate ease-in-out; }
        .bg-slide.active { opacity: 1; background: radial-gradient(circle at 50% 50%, #1a2035 0%, #050811 100%); }
        #vignette { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle, transparent 30%, #000 130%); pointer-events: none; }

        header { position: fixed; top: 0; left: 0; width: 100%; height: 85px; background: rgba(10, 15, 25, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); z-index: 100; display: flex; align-items: center; justify-content: center; padding-top: 15px; }
        .h-wrap { width: 100%; max-width: 800px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { font-size: 9px; background: rgba(34, 197, 94, 0.1); color: #22c55e; padding: 4px 8px; border-radius: 20px; border: 1px solid rgba(34, 197, 94, 0.2); display: flex; align-items: center; gap: 4px; font-weight: 800; text-transform: uppercase; }
        .status-dot { width: 5px; height: 5px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 5px #22c55e; }
        h1 { font-size: 18px; font-weight: 900; background: linear-gradient(to right, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }

        main.chat { position: fixed; top: 85px; bottom: 90px; left: 0; width: 100%; overflow-y: auto; padding: 25px 15px; display: flex; flex-direction: column; align-items: center; scroll-behavior: smooth; }
        .chat-wrap { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 30px; }
        
        .msg { display: flex; gap: 12px; width: 100%; align-items: flex-end; animation: slideUp 0.3s ease; }
        .msg.user { justify-content: flex-end; }
        .avatar { width: 36px; height: 38px; border-radius: 50%; background: #000; border: 2px solid var(--gold); flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 5px; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); transition: 0.3s; }
        
        @keyframes floatAvatar { 0% { transform: translateY(0px); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); } 50% { transform: translateY(-4px); box-shadow: 0 0 20px rgba(0, 242, 255, 0.7); border-color: var(--neon); } 100% { transform: translateY(0px); box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); } }
        .ai .avatar { animation: floatAvatar 3s infinite ease-in-out; border-color: rgba(0, 242, 255, 0.4); }

        .bubble-container { display: flex; flex-direction: column; max-width: calc(100vw - 80px); }
        .bubble { padding: 14px 18px; font-size: 14px; line-height: 1.6; border-radius: 20px; backdrop-filter: blur(10px); transition: 0.3s; }
        
        .ai .bubble { background: var(--card-bg); color: #f3f4f6; border: 1px solid rgba(255,255,255,0.08); border-bottom-left-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .user .bubble { background: linear-gradient(135deg, var(--accent), #1d4ed8); color: #fff; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .timestamp { font-size: 9px; color: rgba(255,255,255,0.3); margin-top: 5px; font-weight: 600; padding: 0 5px; }

        footer { position: fixed; bottom: 0; left: 0; width: 100%; height: 90px; background: linear-gradient(to top, #000 70%, transparent); display: flex; justify-content: center; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .in-box { width: 92%; max-width: 800px; background: rgba(25, 30, 45, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; height: 55px; margin-top: 5px; }
        textarea { flex: 1; background: none; border: none; color: #fff; font-size: 15px; outline: none; resize: none; max-height: 40px; padding: 8px; }
        .btn-send { background: var(--accent); border: none; width: 42px; height: 42px; border-radius: 50%; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }

        /* CSS DO MENU LATERAL */
        aside.sidebar { position: fixed; top: 0; left: -100%; width: 300px; height: 100%; z-index: 3000; background: rgba(5, 8, 17, 0.98); backdrop-filter: blur(30px); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid rgba(212, 175, 55, 0.1); overflow-y: auto; padding-bottom: 20px; box-shadow: none; }
        .sidebar.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.9); }
        #sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2999; display: none; opacity: 0; transition: 0.4s; }
        #sidebar-overlay.show { display: block; opacity: 1; }
        
        .u-box { padding: 60px 25px 20px; text-align: center; background: linear-gradient(to bottom, rgba(212, 175, 55, 0.05), transparent); position: relative; }
        .u-img { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--gold); margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        .sys-info { margin: 10px 20px 15px; padding: 18px; border-radius: 20px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
        .sys-info p { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .sys-info span { font-size: 13px; color: #fff; font-weight: 700; }
        .skin-panel { margin: 15px 20px; padding: 15px; border-radius: 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
        .skin-title { font-size: 10px; color: var(--gold); text-transform: uppercase; font-weight: 900; letter-spacing: 1px; margin-bottom: 12px; display: block; }
        .skin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .skin-btn { aspect-ratio: 1; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: transparent; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; font-size: 8px; font-weight: 800; color: #aaa; transition: 0.2s; }
        .skin-btn i { font-size: 14px; }
        .skin-btn.active { border-color: var(--gold); color: #fff; background: rgba(212,175,55,0.1); }
        .update-panel { margin: 0 20px 20px; border-radius: 20px; background: rgba(0,0,0,0.4); border: 1px solid rgba(37, 99, 235, 0.2); overflow: hidden; }
        .update-header { background: rgba(37, 99, 235, 0.1); padding: 12px 18px; font-size: 11px; font-weight: 900; color: #60a5fa; display: flex; align-items: center; justify-content: space-between; }
        .update-body { padding: 15px; }
        .update-item { border-left: 2px solid var(--gold); padding-left: 12px; margin-bottom: 12px; }
        .update-version { font-size: 12px; color: var(--gold); font-weight: 800; }
        .update-text { font-size: 11px; color: #aaa; margin-top: 2px; line-height: 1.4; }

        /* TELA DE LOADING */
        #update-splash { position: fixed; inset: 0; background: #050811; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; transition: opacity 0.8s ease, transform 0.8s ease; }
        .pulse-img { width: 110px; height: 110px; border-radius: 25px; border: 2px solid var(--neon); box-shadow: 0 0 30px rgba(0,242,255,0.4); margin-bottom: 25px; object-fit: cover; filter: grayscale(100%) brightness(0.5); transition: filter 1.5s ease-in-out; }
        .loading-active .pulse-img { filter: grayscale(0%) brightness(1); }
        .progress-container { width: 100%; max-width: 280px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; position: relative; }
        #u-progress { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: width 0.3s ease; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="bg-container"><div class="bg-slide active"></div></div>
    <div id="vignette"></div>

    <div id="update-splash">
        <img src="https://spicy-harlequin-pqaujlkovi.edgeone.app/pngtree-beautiful-ai-generated-girl-so-much-attractive-png-image_12342109.png" class="pulse-img">
        <h2 style="color:#fff; font-size:17px; font-weight:900; margin-bottom:5px;">SISTEMA LARA ELITE</h2>
        <p style="color:#888; font-size:11px; letter-spacing:2px; margin-bottom:35px;">Iniciando conexões...</p>
        <div class="progress-container"><div id="u-progress"></div></div>
        <div id="u-perc" style="color:var(--neon); font-size:15px; font-weight:900; margin-top:15px;">0%</div>
    </div>

    <div id="sidebar-overlay" onclick="UI.menu(false)"></div>
    <aside class="sidebar" id="sidebar">
        <div class="u-box">
            <button onclick="UI.menu(false)" style="position:absolute; top:20px; right:20px; background:none; border:none; color:#888; font-size:22px; cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
            <div class="u-img"><i class="fa-solid fa-user" style="color:var(--gold); font-size:35px;"></i></div>
            <h3 style="font-size:16px; font-weight:900; color:var(--gold);">Visitante</h3>
            <p style="font-size:11px; color:#aaa; margin-top:5px;">Status: Conectado</p>
        </div>

        <div class="sys-info">
            <p>Modelo Neural</p>
            <span>Lara Elite v21.11</span>
        </div>

        <div class="skin-panel">
            <span class="skin-title">Aparência do Sistema</span>
            <div class="skin-grid">
                <button class="skin-btn active" onclick="UI.setTheme('default', this)"><i class="fa-solid fa-bolt"></i> Padrão</button>
                <button class="skin-btn" onclick="UI.setTheme('cyber', this)"><i class="fa-solid fa-microchip"></i> Cyber</button>
                <button class="skin-btn" onclick="UI.setTheme('stealth', this)"><i class="fa-solid fa-moon"></i> Stealth</button>
            </div>
        </div>

        <div class="update-panel">
            <div class="update-header"><span><i class="fa-solid fa-code"></i> CHANGELOG</span> <span>v21.11</span></div>
            <div class="update-body">
                <div class="update-item">
                    <div class="update-version">Interface UI/UX</div>
                    <div class="update-text">Implementação do Menu e Sistema de Temas.</div>
                </div>
            </div>
        </div>
    </aside>

    <header><div class="h-wrap">
        <button onclick="UI.menu(true)" style="background:none; border:none; color:#fff; font-size:22px; cursor:pointer;"><i class="fa-solid fa-bars-staggered"></i></button>
        <div style="text-align: center;">
            <h1>LARA ELITE</h1>
            <div class="status-badge"><div class="status-dot"></div> ONLINE</div>
        </div>
        <div style="width:22px;"></div>
    </div></header>

    <main class="chat" id="chat-box">
        <div class="chat-wrap" id="chat-content">
            </div>
    </main>

    <footer>
        <div class="in-box">
            <textarea id="user-input" placeholder="Comunicação com o sistema..."></textarea>
            <button class="btn-send"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </footer>

    <script>
        // LÓGICA DA INTERFACE (MENU E TEMAS)
        const UI = {
            menu: (abrir) => {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebar-overlay');
                if(abrir) {
                    sidebar.classList.add('open');
                    overlay.classList.add('show');
                } else {
                    sidebar.classList.remove('open');
                    overlay.classList.remove('show');
                }
            },
            setTheme: (tema, btnElement) => {
                // Tira todas as classes de tema do body
                document.body.className = '';
                if(tema !== 'default') document.body.classList.add('theme-' + tema);
                
                // Atualiza o botão ativo
                document.querySelectorAll('.skin-btn').forEach(btn => btn.classList.remove('active'));
                btnElement.classList.add('active');
            }
        };

        // LÓGICA DO LOADING E PRIMEIRA MENSAGEM
        const CoreSplash = {
            iniciar: () => {
                const splash = document.getElementById('update-splash');
                const progress = document.getElementById('u-progress');
                const perc = document.getElementById('u-perc');
                setTimeout(() => splash.classList.add('loading-active'), 100);

                let value = 0;
                const interval = setInterval(() => {
                    value += Math.floor(Math.random() * 15) + 5; 
                    if (value >= 100) {
                        value = 100;
                        clearInterval(interval);
                        setTimeout(CoreSplash.finalizar, 800); 
                    }
                    progress.style.width = value + '%';
                    perc.innerText = value + '%';
                }, 200);
            },

            finalizar: () => {
                const splash = document.getElementById('update-splash');
                splash.style.opacity = '0';
                splash.style.transform = 'scale(1.1)'; 
                
                setTimeout(() => { 
                    splash.style.display = 'none'; 
                    CoreSplash.boasVindas(); // Chama a mensagem logo que a tela some
                }, 800);
            },

            boasVindas: () => {
                const chat = document.getElementById('chat-content');
                chat.innerHTML = `
                    <div class="msg ai">
                        <div class="avatar"><img src="https://spicy-harlequin-pqaujlkovi.edgeone.app/pngtree-beautiful-ai-generated-girl-so-much-attractive-png-image_12342109.png" style="width:100%; height:100%; object-fit:cover;"></div>
                        <div class="bubble-container">
                            <div class="bubble">Sistemas online e otimizados. Menu lateral operante. Como posso te auxiliar neste momento?</div>
                            <div class="timestamp">AGORA</div>
                        </div>
                    </div>
                `;
            }
        };

        window.onload = () => { CoreSplash.iniciar(); };
    </script>
</body>
</html>
