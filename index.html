        const Storage = { set: (k, v) => localStorage.setItem(k, JSON.stringify(v)), get: (k) => JSON.parse(localStorage.getItem(k)) };
        const VERSION = "29"; 
        const AI_AVATAR_URL = "https://spicy-harlequin-pqaujlkovi.edgeone.app/pngtree-beautiful-ai-generated-girl-so-much-attractive-png-image_12342109.png";

        async function hardReloadPWA() {
            try {
                const regs = await navigator.serviceWorker.getRegistrations();
                for (const reg of regs) { await reg.unregister(); }
                const keys = await caches.keys();
                for (const key of keys) { await caches.delete(key); }
                window.location.replace(window.location.href.split('?')[0] + '?update=' + Date.now());
            } catch (e) { window.location.reload(true); }
        }

        const Core = {
            h: [], typing: false, name: '', photo: '',
            init() {
                this.checkUpdates();
                this.photo = Storage.get('l_photo') || ''; 
                this.name = Storage.get('l_name') || ''; 
                this.h = Storage.get('l_chat') || [];
                UI.update(); this.h.forEach(m => UI.draw(m.r, m.t));
                UI.setSkin(Storage.get('l_skin') || 'gold');
                if (!Storage.get('l_onboard')) document.getElementById('onboarding').style.display = 'flex';
                Visual.init(); 
                if (Storage.get('l_just_updated')) {
                    setTimeout(() => {
                        const m = `⚡ **SISTEMA v${VERSION} OMEGA:** Purga completa! Cache antigo eliminado e motor de elite v29 estabilizado.`;
                        UI.draw('ai', m); this.h.push({t: m, r:'ai'});
                        Storage.set('l_chat', this.h.slice(-20));
                        Storage.set('l_just_updated', false);
                    }, 1500);
                }
                this.registerSW();
            },
            checkUpdates() {
                const storedV = Storage.get('l_version');
                if (storedV !== VERSION) {
                    const splash = document.getElementById('update-splash');
                    const bar = document.getElementById('u-progress');
                    const perc = document.getElementById('u-perc');
                    splash.style.display = 'flex';
                    let p = 0;
                    const interval = setInterval(() => {
                        p += 2; if (p > 100) p = 100;
                        if (bar) bar.style.width = p + '%';
                        if (perc) perc.innerText = p + '%';
                        if (p === 100) {
                            clearInterval(interval);
                            Storage.set('l_version', VERSION);
                            Storage.set('l_just_updated', true);
                            setTimeout(async () => { await hardReloadPWA(); }, 500);
                        }
                    }, 30);
                }
            },
            registerSW() { if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js?v=' + VERSION); } },
            async ativarNotificacoesDeElite() {
                const p = await Notification.requestPermission();

                    const r = await navigator.serviceWorker.ready;
                    r.showNotification("LARA ELITE OMEGA", { body: "⚡ CANAL DE VOZ SINCRONIZADO.", icon: AI_AVATAR_URL, vibrate: [300, 100, 300] });
                }
            },
            send() {
                if (this.typing) return;
                const i = document.getElementById('u-in'); let t = i.value.trim(); if(!t) return;
                this.typing = true; i.value = ""; 
                UI.draw('user', t); this.h.push({t, r:'user'});
                UI.dots(true);
                fetch(`https://text.pollinations.ai/${encodeURIComponent(t)}?private=true`).then(r => r.text()).then(txt => {
                    UI.dots(false);
                    const cleanTxt = txt.replace(/Ad 🌸|Support/gi, '').trim();
                    UI.draw('ai', cleanTxt); this.h.push({t: cleanTxt, r:'ai'});
                    Storage.set('l_chat', this.h.slice(-20)); this.typing = false;
                });
            }
        };

        const UI = {
            box: document.getElementById('chat-box'), main: document.getElementById('chat-main'),
            setSkin(skin) { document.body.className = skin === 'gold' ? '' : `theme-${skin}`; Storage.set('l_skin', skin); },
            scrollToEnd() { this.main.scrollTop = this.main.scrollHeight; },
            copyPix() { navigator.clipboard.writeText("61318165300"); alert("Chave copiada!"); },
            draw(r, t) {
                const w = document.createElement('div'); w.className = `msg ${r}`;
                let av = r === 'user' ? '<i class="fa-solid fa-user-secret"></i>' : `<img src="${AI_AVATAR_URL}" style="width:100%;height:100%;object-fit:cover;">`;

                this.box.appendChild(w); this.scrollToEnd();
            },
            dots(s) { if(s) { const d = document.createElement('div'); d.id='dots'; d.className='msg ai'; d.innerHTML=`<div class="avatar"><img src="${AI_AVATAR_URL}"></div><div class="bubble">...</div>`; this.box.appendChild(d); } else { const d = document.getElementById('dots'); if(d) d.remove(); } this.scrollToEnd(); },
            size(t) { t.style.height='auto'; t.style.height=t.scrollHeight+'px'; this.scrollToEnd(); },
            menu(s) { document.getElementById('menu').classList.toggle('open', s); document.getElementById('overlay').style.display = s ? 'block' : 'none'; },
            update() { document.getElementById('p-btn-top').innerHTML = '<i class="fa-solid fa-user-secret"></i>'; }
        };

        const Visual = {
            slides: document.querySelectorAll('.bg-slide'), current: 0,
            async update() {
                const url = `https://image.pollinations.ai/prompt/anime_cyberpunk_dark_aesthetic?width=1080&height=1920&nologo=true&seed=${Math.random()}`;
                const next = this.slides[1 - this.current];
                const img = new Image();
                img.onload = () => { next.style.backgroundImage = `url(${url})`; this.slides[this.current].classList.remove('active'); next.classList.add('active'); this.current = 1 - this.current; };
                img.src = url;
            },
            init() { this.update(); setInterval(() => this.update(), 60000); }
        };
