    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Fira+Code:wght@400;500&display=swap');
        
        :root { --accent: #2563eb; --gold: #D4AF37; --bg: #050811; --card-bg: rgba(15, 20, 35, 0.85); --neon: #00f2ff; }
        body.theme-cyber { --accent: #c026d3; --gold: #22d3ee; --bg: #020617; --card-bg: rgba(30, 0, 60, 0.7); --neon: #f0abfc; }
        body.theme-stealth { --accent: #334155; --gold: #94a3b8; --bg: #0f172a; --card-bg: rgba(15, 23, 42, 0.95); --neon: #cbd5e1; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { background: #000; color: #fff; height: 100%; width: 100%; overflow: hidden; position: fixed; inset: 0; transition: background 0.5s ease; }
        
        #bg-container { position: fixed; inset: 0; z-index: -2; background: #000; }
        @keyframes bgPan { 0% { transform: scale(1); } 100% { transform: scale(1.08); } }
        .bg-slide { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: 0; transition: opacity 2s ease-in-out; animation: bgPan 30s infinite alternate ease-in-out; }
        .bg-slide.active { opacity: 1; }
        #vignette { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle, transparent 30%, #000 130%); pointer-events: none; }

        header { position: fixed; top: 0; left: 0; width: 100%; height: 85px; background: rgba(10, 15, 25, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); z-index: 100; display: flex; align-items: center; justify-content: center; padding-top: 15px; }
        .h-wrap { width: 100%; max-width: 800px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 18px; font-weight: 900; background: linear-gradient(to right, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; transition: 0.3s; }

        main.chat { position: fixed; top: 85px; bottom: 90px; left: 0; width: 100%; overflow-y: auto; padding: 25px 15px; display: flex; flex-direction: column; align-items: center; scroll-behavior: smooth; }
        .chat-wrap { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 30px; }
        
        .msg { display: flex; gap: 12px; width: 100%; align-items: flex-end; animation: slideUp 0.3s ease; }
        .msg.user { justify-content: flex-end; }
        .avatar { width: 36px; height: 38px; border-radius: 50%; background: #000; border: 2px solid var(--gold); flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 5px; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); transition: 0.3s; }
        
        .bubble-container { display: flex; flex-direction: column; max-width: calc(100vw - 80px); }
        .bubble { padding: 14px 18px; font-size: 15px; line-height: 1.6; border-radius: 20px; backdrop-filter: blur(10px); transition: 0.3s; }
        
        @keyframes gradientFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .user .bubble { background: linear-gradient(135deg, var(--accent), #1d4ed8, #0ea5e9, var(--accent)); background-size: 300% 300%; animation: gradientFlow 6s ease infinite; color: #fff; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }

        @keyframes holoScan { 0% { transform: translateX(-150%) rotate(45deg); } 100% { transform: translateX(150%) rotate(45deg); } }
        .ai .bubble { background: var(--card-bg); color: #f3f4f6; border: 1px solid rgba(255,255,255,0.08); border-bottom-left-radius: 4px; position: relative; overflow: hidden; }
        .ai .bubble::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(to right, transparent, rgba(0, 242, 255, 0.05), transparent); transform: rotate(45deg); animation: holoScan 5s infinite linear; pointer-events: none; }

        footer { position: fixed; bottom: 0; left: 0; width: 100%; height: 90px; background: linear-gradient(to top, #000 70%, transparent); display: flex; justify-content: center; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
        .in-box { width: 92%; max-width: 800px; background: rgba(25, 30, 45, 0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; height: 55px; margin-top: 5px; }
        textarea { flex: 1; background: none; border: none; color: #fff; font-size: 15px; outline: none; resize: none; max-height: 40px; padding: 8px; }
        .btn-send { background: var(--accent); border: none; width: 42px; height: 42px; border-radius: 50%; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }

        aside.sidebar { position: fixed; top: 0; left: -100%; width: 300px; height: 100%; z-index: 3000; background: rgba(5, 8, 17, 0.98); backdrop-filter: blur(30px); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-right: 1px solid rgba(212, 175, 55, 0.1); overflow-y: auto; }
        .sidebar.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.9); }
        .skin-panel { margin: 15px 20px; padding: 15px; border-radius: 20px; background: rgba(255,255,255,0.03); }
        .skin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .skin-btn { aspect-ratio: 1; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: 800; color: #aaa; transition: 0.2s; background: none; }
        .skin-btn.active { border-color: var(--gold); color: #fff; background: rgba(212,175,55,0.1); }

        #update-splash { position: fixed; inset: 0; background: #050811; z-index: 99999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .progress-container { width: 100%; max-width: 280px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 20px; }
        #u-progress { width: 0%; height: 100%; background: var(--neon); transition: width 0.3s ease; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        #gatekeeper, #onboarding { position: fixed; inset: 0; background: #050811; z-index: 9999; display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body class="">

    <div id="update-splash">
        <img src="https://spicy-harlequin-pqaujlkovi.edgeone.app/pngtree-beautiful-ai-generated-girl-so-much-attractive-png-image_12342109.png" style="width:110px; height:110px; border-radius:25px; border:2px solid var(--neon);">
        <h2 style="margin-top:20px;">ATUALIZAÇÃO DE ELITE</h2>
        <div class="progress-container"><div id="u-progress"></div></div>
        <div id="u-perc" style="margin-top:10px; color:var(--neon); font-weight:900;">0%</div>
    </div>

    <section id="onboarding">
        <div style="background: #0a0f1e; padding: 40px; border-radius: 40px; border: 1px solid var(--gold); text-align: center; max-width: 360px;">
            <i class="fa-solid fa-rocket" style="color:var(--gold); font-size: 40px; margin-bottom: 20px;"></i>
            <h2>LARA ELITE v21.12</h2>
            <p style="font-size: 13px; color: #888; margin: 20px 0;">O Service Worker foi ativado. Controle total offline garantido.</p>
            <button onclick="Core.triggerInstallOnboarding()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:15px; color:#fff; font-weight:900; margin-bottom: 10px;">INSTALAR APP</button>
            <button onclick="Core.initOnboarding()" style="width:100%; padding:15px; background:none; border:1px solid #333; border-radius:15px; color:#fff;">CONTINUAR NO BROWSER</button>
        </div>
    </section>

    <section id="gatekeeper">
        <div style="background: #0a0f1e; padding: 40px; border-radius: 40px; border: 1px solid var(--gold); text-align: center; max-width: 360px;">
            <div id="preview" style="width:90px; height:90px; border-radius:50%; border:2px solid var(--gold); margin: 0 auto 20px; overflow:hidden; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="document.getElementById('up').click()"><i class="fa-solid fa-user" style="color:var(--gold); font-size:30px;"></i></div>
            <input type="file" id="up" accept="image/*" hidden onchange="Core.up(event)">
            <input type="text" id="p-name" placeholder="Nome do Desenvolvedor" style="width:100%; padding:16px; background:#000; border:1px solid #333; border-radius:18px; color:#fff; margin-bottom:20px; text-align:center;">
            <button onclick="Core.save()" style="width:100%; padding:18px; background:var(--accent); border:none; border-radius:18px; color:#fff; font-weight:900;">INICIAR SISTEMA</button>
        </div>
    </section>

    <header><div class="h-wrap">
        <button onclick="UI.menu(true)" style="background:none; border:none; color:#fff; font-size:22px;"><i class="fa-solid fa-bars-staggered"></i></button>
        <h1>Lara Elite</h1>
        <div id="p-btn-top" style="width:38px; height:38px; border-radius:50%; border:2px solid var(--gold); overflow:hidden;"></div>
    </div></header>

    <div id="overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; z-index:2500;" onclick="UI.menu(false)"></div>
    
    <aside id="menu" class="sidebar">
        <div style="padding:60px 25px 20px; text-align:center;">
            <div id="menu-photo" style="width:90px; height:90px; border-radius:50%; border:3px solid var(--gold); margin:0 auto 15px; overflow:hidden;">👤</div>
            <p id="menu-name" style="font-weight:900;">Mestre</p>
        </div>
        
        <div class="skin-panel">
            <span style="font-size:10px; color:var(--gold); font-weight:900;">Skins Elite</span>
            <div class="skin-grid" style="margin-top:10px;">
                <button onclick="UI.setSkin('gold')" id="skin-gold" class="skin-btn"><i class="fa-solid fa-crown"></i>Gold</button>
                <button onclick="UI.setSkin('cyber')" id="skin-cyber" class="skin-btn"><i class="fa-solid fa-bolt"></i>Cyber</button>
                <button onclick="UI.setSkin('stealth')" id="skin-stealth" class="skin-btn"><i class="fa-solid fa-user-ninja"></i>Stealth</button>
            </div>
        </div>

        <nav style="padding:20px; display:flex; flex-direction:column; gap:10px;">
            <button onclick="Core.exportChat()" style="width:100%; padding:15px; border-radius:15px; background:rgba(37, 99, 235, 0.1); border:1px solid var(--accent); color:#fff; font-weight:bold;"><i class="fa-solid fa-download"></i> EXPORTAR LOG</button>
            <button onclick="Core.clearChat()" style="width:100%; padding:15px; border-radius:15px; background:rgba(239, 68, 68, 0.1); border:1px solid #ef4444; color:#ef4444; font-weight:bold;"><i class="fa-solid fa-trash"></i> LIMPAR HISTÓRICO</button>
            <button onclick="Core.logout()" style="width:100%; padding:15px; border-radius:15px; background:rgba(255,255,255,0.05); border:1px solid #333; color:#ccc;">TROCAR PERFIL</button>
        </nav>
    </aside>

    <main class="chat" id="chat-main"><div class="chat-wrap" id="chat-box"></div></main>
    
    <footer>
        <div class="in-box">
            <textarea id="u-in" rows="1" placeholder="Comando para a Lara..." oninput="UI.size(this)" onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); Core.send(); }"></textarea>
            <button type="button" class="btn-send" onclick="Core.send()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </footer>

    <script>
        const Storage = { set: (k, v) => localStorage.setItem(k, JSON.stringify(v)), get: (k) => JSON.parse(localStorage.getItem(k)) };
        const VERSION = "21.12"; 
        const AI_AVATAR_URL = "https://spicy-harlequin-pqaujlkovi.edgeone.app/pngtree-beautiful-ai-generated-girl-so-much-attractive-png-image_12342109.png";
        let deferredPrompt; 

        const Visual = {
            slides: document.querySelectorAll('.bg-slide'), current: 0,
            list: ["Naruto", "Luffy", "Goku", "Itachi"],
            async update() {
                const char = this.list[Math.floor(Math.random() * this.list.length)];
                const url = `https://image.pollinations.ai/prompt/anime_${char}_dark_aesthetic?width=1080&height=1920&model=flux&nologo=true&seed=${Math.random()}`;
                const next = this.slides[1 - this.current];
                const img = new Image();
                img.onload = () => { next.style.backgroundImage = `url(${url})`; this.slides[this.current].classList.remove('active'); next.classList.add('active'); this.current = 1 - this.current; };
                img.src = url;
            },
            init() { this.update(); setInterval(() => this.update(), 60000); }
        };

        const Core = {
            h: [], typing: false, name: '', photo: '',
            init() {
                this.photo = Storage.get('l_photo') || ''; 
                this.name = Storage.get('l_name') || ''; 
                this.h = Storage.get('l_chat') || [];
                UI.update(); this.h.forEach(m => UI.draw(m.r, m.t));
                UI.setSkin(Storage.get('l_skin') || 'gold');
                
                if (!Storage.get('l_onboard')) document.getElementById('onboarding').style.display = 'flex';
                else if (!Storage.get('l_active')) document.getElementById('gatekeeper').style.display = 'flex';

                Visual.init();
                this.checkUpdates();
                this.registerSW();
            },

            registerSW() {
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('./sw.js').then(reg => {
                        reg.onupdatefound = () => {
                            const installingWorker = reg.installing;
                            installingWorker.onstatechange = () => {
                                if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    UI.toast("NOVA VERSÃO DISPONÍVEL! REINICIANDO...");
                                    setTimeout(() => location.reload(), 2000);
                                }
                            };
                        };
                    });
                }
            },

            checkUpdates() {
                const lastV = Storage.get('l_version');
                if (lastV && lastV !== VERSION) {
                    const splash = document.getElementById('update-splash');
                    splash.style.display = 'flex';
                    let p = 0;
                    const interval = setInterval(() => {
                        p += 10;
                        document.getElementById('u-progress').style.width = p + '%';
                        document.getElementById('u-perc').innerText = p + '%';
                        if (p >= 100) { clearInterval(interval); Storage.set('l_version', VERSION); setTimeout(() => splash.style.display='none', 500); }
                    }, 100);
                } else Storage.set('l_version', VERSION);
            },

            triggerInstallOnboarding() { if (deferredPrompt) deferredPrompt.prompt(); else UI.toast("Use o menu do navegador"); },
            initOnboarding() { Storage.set('l_onboard', true); location.reload(); },
            save() { this.name = document.getElementById('p-name').value || 'Mestre'; Storage.set('l_name', this.name); Storage.set('l_photo', this.photo); Storage.set('l_active', true); location.reload(); },
            logout() { Storage.set('l_active', false); location.reload(); },
            
            async requestAI() {
                try {
                    const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(this.h.slice(-1)[0].t)}?private=true`);
                    UI.dots(false);
                    const txt = await res.text();
                    this.h.push({t: txt, r:'ai'});
                    Storage.set('l_chat', this.h.slice(-20));
                    UI.draw('ai', txt);
                } catch(e) { UI.dots(false); this.typing = false; }
            },

            send() {
                const i = document.getElementById('u-in'); const t = i.value.trim(); if(!t || this.typing) return;
                this.typing = true; i.value = ""; UI.draw('user', t); UI.dots(true);
                this.h.push({t, r:'user'}); this.requestAI();
            },
            
            exportChat() {
                const blob = new Blob([JSON.stringify(this.h)], { type: 'application/json' });
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Lara_Elite_Log.json'; a.click();
            },
            clearChat() { Storage.set('l_chat', []); location.reload(); },
            up(e) {
                const f = e.target.files[0]; const r = new FileReader();
                r.onload = (ev) => { this.photo = ev.target.result; document.getElementById('preview').innerHTML = `<img src="${this.photo}" style="width:100%;height:100%;object-fit:cover;">`; };
                r.readAsDataURL(f);
            }
        };

        const UI = {
            box: document.getElementById('chat-box'),
            main: document.getElementById('chat-main'),
            setSkin(skin) {
                document.body.className = skin === 'gold' ? '' : `theme-${skin}`;
                document.querySelectorAll('.skin-btn').forEach(b => b.classList.toggle('active', b.id === `skin-${skin}`));
                Storage.set('l_skin', skin);
            },
            toast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); },
            scrollToEnd() { this.main.scrollTop = this.main.scrollHeight; },
            draw(r, t) {
                const w = document.createElement('div'); w.className = `msg ${r}`;
                const av = r === 'user' ? (Core.photo ? `<img src="${Core.photo}" style="width:100%;height:100%;object-fit:cover;">` : '👤') : `<img src="${AI_AVATAR_URL}" style="width:100%;height:100%;object-fit:cover;">`;
                w.innerHTML = `${r === 'ai' ? `<div class="avatar">${av}</div>` : ''}<div class="bubble-container"><div class="bubble">${marked.parse(t)}</div></div>${r === 'user' ? `<div class="avatar">${av}</div>` : ''}`;
                this.box.appendChild(w); this.scrollToEnd();
            },
            dots(s) { 
                if(s) { const d = document.createElement('div'); d.id='dots'; d.className='msg ai'; d.innerHTML=`<div class="avatar">...</div><div class="bubble">Processando...</div>`; this.box.appendChild(d); }
                else { const d = document.getElementById('dots'); if(d) d.remove(); this.typing = false; }
            },
            size(t) { t.style.height='auto'; t.style.height=t.scrollHeight+'px'; },
            menu(s) { document.getElementById('menu').classList.toggle('open', s); document.getElementById('overlay').style.display = s ? 'block' : 'none'; },
            update() {
                const img = Core.photo ? `<img src="${Core.photo}" style="width:100%;height:100%;object-fit:cover;">` : '👤';
                document.getElementById('p-btn-top').innerHTML = img; 
                document.getElementById('menu-photo').innerHTML = img; 
                document.getElementById('menu-name').innerText = Core.name || 'Mestre';
            }
        };

        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });
        window.onload = () => Core.init();
    </script>
</body>
</html>
